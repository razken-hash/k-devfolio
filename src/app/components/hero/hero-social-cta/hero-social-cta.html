<div class="w-full space-y-6 ">

    <!-- Social Links -->
    <div class="flex items-center justify-center lg:justify-start gap-4 sm:gap-6 pt-2 sm:pt-6">

        <!-- GitHub -->
        <div class="group w-12 h-12 sm:w-14 sm:h-14 relative flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full p-[3px] animate-spin-slow"
                style="background: conic-gradient(from 0deg, #84cc16, #22c55e, #10b981, #84cc16);">
            </div>
            <div class="absolute w-[calc(100%-6px)] h-[calc(100%-6px)] rounded-full bg-white
                        group-hover:bg-gradient-to-br group-hover:from-lime-400 group-hover:via-emerald-400
                        group-hover:to-teal-400 transition-all duration-500">
            </div>
            <a href="https://github.com/razken-hash" target="_blank" rel="noopener noreferrer" aria-label="GitHub"
                class="relative z-10 w-full h-full rounded-full flex items-center justify-center
                       text-emerald-900 group-hover:text-white transition-all duration-500 group-hover:scale-110">
                <fa-icon [icon]="faGithub" class="text-2xl sm:text-3xl"></fa-icon>
            </a>
        </div>

        <!-- LinkedIn -->
        <div class="group w-12 h-12 sm:w-14 sm:h-14 relative flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full p-[3px] animate-spin-slow"
                style="background: conic-gradient(from 0deg, #84cc16, #22c55e, #10b981, #84cc16);">
            </div>
            <div class="absolute w-[calc(100%-6px)] h-[calc(100%-6px)] rounded-full bg-white
                        group-hover:bg-gradient-to-br group-hover:from-lime-400 group-hover:via-emerald-400
                        group-hover:to-teal-400 transition-all duration-500">
            </div>
            <a href="https://www.linkedin.com/in/abderrazak-kenniche-a1a213227/" target="_blank"
                rel="noopener noreferrer" aria-label="LinkedIn" class="relative z-10 w-full h-full rounded-full flex items-center justify-center
                       text-emerald-900 group-hover:text-white transition-all duration-500 group-hover:scale-110">
                <fa-icon [icon]="faLinkedinIn" class="text-2xl sm:text-3xl"></fa-icon>
            </a>
        </div>

        <!-- Medium -->
        <div class="group w-12 h-12 sm:w-14 sm:h-14 relative flex items-center justify-center">
            <div class="absolute w-full h-full rounded-full p-[3px] animate-spin-slow"
                style="background: conic-gradient(from 0deg, #84cc16, #22c55e, #10b981, #84cc16);">
            </div>
            <div class="absolute w-[calc(100%-6px)] h-[calc(100%-6px)] rounded-full bg-white
                        group-hover:bg-gradient-to-br group-hover:from-lime-400 group-hover:via-emerald-400
                        group-hover:to-teal-400 transition-all duration-500">
            </div>
            <a href="https://medium.com" target="_blank" rel="noopener noreferrer" aria-label="Medium" class="relative z-10 w-full h-full rounded-full flex items-center justify-center
                       text-emerald-900 group-hover:text-white transition-all duration-500 group-hover:scale-110">
                <fa-icon [icon]="faMedium" class="text-2xl sm:text-3xl"></fa-icon>
            </a>
        </div>

    </div>

    <!-- CTA Buttons -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 w-[70vw] sm:w-[490px] max-w-md lg:max-w-xl mx-auto lg:mx-0 pt-2">
        <a routerLink="/blog" class="group inline-flex items-center justify-center w-full px-8 py-4 text-base font-semibold
                   rounded-xl shadow-lg text-emerald-950 bg-gradient-to-r from-lime-400 to-emerald-400
                   hover:from-lime-500 hover:to-emerald-500 transition-all duration-300
                   hover:shadow-lime-400/50 hover:scale-105">
            {{ 'HERO.DISCOVER_BLOG' | translate }}
            <fa-icon [icon]="faArrowRight" class="ml-2 group-hover:translate-x-1 transition-transform"></fa-icon>
        </a>
        <app-cv-preview class="w-full"></app-cv-preview>
    </div>

</div>
