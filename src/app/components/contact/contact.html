<section id="contact"
    class="bg-gradient-to-br from-emerald-900 via-teal-900 to-emerald-950 text-white py-10 min-h-[calc(100vh-80px)] relative overflow-hidden">

    <!-- Animated background elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-20 right-10 w-96 h-96 bg-lime-400/10 rounded-full blur-3xl animate-pulse"></div>
        <div class="absolute bottom-20 left-10 w-72 h-72 bg-emerald-400/10 rounded-full blur-3xl animate-pulse"
            style="animation-delay: 1s;"></div>
    </div>

    <div class="max-w-7xl mx-auto px-6 relative z-10">

        <!-- Section Header -->
        <div class="text-center mb-16">
            <p class="text-lime-400 font-semibold text-sm tracking-wider uppercase mb-4">
                {{ 'CONTACT.CONTACT_ME' | translate }}
            </p>
            <h1 class="text-5xl md:text-6xl font-bold mb-6 text-white">
                {{ 'CONTACT.READY_TO_COLLABORATE' | translate }}
            </h1>
            <p class="text-gray-300 text-lg max-w-2xl mx-auto">
                {{ 'CONTACT.PROJECT_IDEA_PROMPT' | translate }}
            </p>
        </div>

        <div class="grid lg:grid-cols-2 gap-12 items-stretch">

            <!-- LEFT SIDE -->
            <app-contact-details></app-contact-details>

            <!-- RIGHT SIDE: FORM -->
            <app-contact-form></app-contact-form>

        </div>
    </div>
</section>
