<!-- Left: Logo -->
<a routerLink="/" class="flex items-center space-x-3 group cursor-pointer">
    <div class="relative">
        <div
            class="h-12 w-12 rounded-xl bg-gradient-to-br from-lime-400 to-lime-500 flex items-center justify-center text-2xl font-bold text-emerald-900 shadow-lg group-hover:scale-110 transition-transform duration-300">
            K
        </div>
        <div
            class="absolute -inset-1 bg-lime-400/20 rounded-xl blur-md group-hover:bg-lime-400/40 transition-all duration-300">
        </div>
    </div>
    <div class="flex flex-col">
        <span class="text-white text-xl font-bold tracking-wide">KENNICHE</span>
        <span class="text-lime-400 text-xs font-medium">{{ 'HERO.SOFTWARE_ENGINEER' | translate }}</span>
    </div>
</a>

<!-- Center: Navigation Links -->
<div class="hidden md:flex items-center space-x-1">
    <a *ngFor="let link of navigationLinks" routerLinkActive="text-lime-400" (click)="linkClicked.emit(link.url)" class="relative text-gray-200 px-4 py-2 text-sm font-medium transition-all duration-300 hover:text-lime-400 group
    rounded-lg hover:bg-white/5 cursor-pointer">
        {{ link.label | translate }}
        <span
            class="absolute left-1/2 -translate-x-1/2 bottom-0 w-0 h-0.5 bg-lime-400 transition-all duration-300 group-hover:w-3/4">
        </span>
    </a>
</div>

<!-- Right: Social + Language -->
<div class="hidden md:flex items-center space-x-4">
    <!-- Social Icons -->
    <div class="flex items-center space-x-2 border-r border-white/20 pr-4">
        <a *ngFor="let link of accountsLinks" [href]="link.url" target="_blank" rel="noopener noreferrer" class="h-9 w-9 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-gray-300
        hover:text-lime-400 transition-all duration-300 border border-white/10 hover:border-lime-400/50"
            [attr.aria-label]="link.label">
            <fa-icon [icon]="link.icon" class="text-base"></fa-icon>
        </a>
    </div>

    <!-- Language Selector -->
    <div class="relative">
        <button id="language-button" (click)="languageMenuToggled.emit()"
            class="h-10 px-3 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center gap-2 transition-all duration-300 border border-white/20 hover:border-lime-400/50 group"
            aria-label="Change language">
            <fa-icon [icon]="faGlobe" class="text-lime-400"></fa-icon>
            <span class="text-white text-sm font-semibold">{{ currentLanguage | uppercase }}</span>
        </button>

        <!-- Language Dropdown -->
        <div *ngIf="languageMenuOpen" id="language-menu"
            class="absolute top-full mt-2 right-0 bg-emerald-900/95 backdrop-blur-md border border-white/20 rounded-xl shadow-2xl overflow-hidden min-w-[180px] animate-fade-in">
            <button *ngFor="let language of availableLanguages" (click)="languageChanged.emit(language.code)" [class]="currentLanguage === language.code
              ? 'bg-lime-400/20 text-lime-400'
              : 'text-gray-200 hover:bg-white/10 hover:text-lime-400'"
                class="w-full px-4 py-3 flex items-center gap-3 transition-all duration-200">
                <span class="text-xl">{{ language.flag }}</span>
                <div class="flex flex-col items-start">
                    <span class="text-sm font-semibold">{{ language.code | uppercase }}</span>
                    <span class="text-xs opacity-80">{{ language.name }}</span>
                </div>
                <svg *ngIf="currentLanguage === language.code" class="w-4 h-4 ml-auto" fill="currentColor"
                    viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                        clip-rule="evenodd" />
                </svg>
            </button>
        </div>
    </div>
</div>
