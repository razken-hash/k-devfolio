<nav class="fixed top-0 w-full h-20 bg-emerald-900/95 backdrop-blur-md shadow-lg border-b border-white/10 z-40">
    <div class="max-w-7xl mx-auto sm:px-6 lg:px-8">
        <div class="flex items-center justify-between px-4 h-20">

            <!-- Desktop: Logo + Nav + Language (all in one row) -->
            <app-desktop-header class="contents" [navigationLinks]="navigationLinks" [accountsLinks]="accountsLinks"
                [availableLanguages]="availableLanguages" [currentLanguage]="currentLanguage"
                [languageMenuOpen]="languageMenuOpen" (linkClicked)="scrollTo($event)"
                (languageMenuToggled)="toggleLanguageMenu()" (languageChanged)="changeLanguage($event)">
            </app-desktop-header>

            <!-- Mobile: Hamburger + Fullscreen Menu -->
            <app-mobile-header class="contents" [navigationLinks]="navigationLinks"
                [availableLanguages]="availableLanguages" [currentLanguage]="currentLanguage"
                [mobileMenuOpen]="mobileMenuOpen" [currentYear]="currentYear()" (menuToggled)="toggleMobileMenu()"
                (linkClicked)="onMobileLinkClicked($event)" (languageChanged)="changeLanguage($event)">
            </app-mobile-header>

        </div>
    </div>
</nav>
