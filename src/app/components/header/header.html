<!-- ENHANCED NAVIGATION WITH LANGUAGE SELECTOR -->
<nav class="fixed top-0 w-full h-20 bg-emerald-900/95 backdrop-blur-md shadow-lg border-b border-white/10 z-40">
    <div class="max-w-7xl mx-auto  sm:px-6 lg:px-8">
        <div class="flex items-center justify-between px-4 h-20">

            <!-- Left: Enhanced Logo -->
            <a routerLink="/" class="flex items-center space-x-3 group cursor-pointer">
                <div class="relative">
                    <div
                        class="h-12 w-12 rounded-xl bg-gradient-to-br from-lime-400 to-lime-500 flex items-center justify-center text-2xl font-bold text-emerald-900 shadow-lg group-hover:scale-110 transition-transform duration-300">
                        K
                    </div>
                    <div
                        class="absolute -inset-1 bg-lime-400/20 rounded-xl blur-md group-hover:bg-lime-400/40 transition-all duration-300">
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-white text-xl font-bold tracking-wide">KENNICHE</span>
                    <span class="text-lime-400 text-xs font-medium">{{ 'HERO.SOFTWARE_ENGINEER' | translate }}</span>
                </div>
            </a>

            <!-- Center: Navigation Links (Desktop) -->
            <div class="hidden md:flex items-center space-x-1">
                <a *ngFor="let link of naivigationLinks" routerLinkActive="text-lime-400" (click)="scrollTo(link.url)"
                    class="relative text-gray-200 px-4 py-2 text-sm font-medium transition-all duration-300 hover:text-lime-400 group rounded-lg hover:bg-white/5 cursor-pointer">
                    {{ link.label | translate }}
                    <span
                        class="absolute left-1/2 -translate-x-1/2 bottom-0 w-0 h-0.5 bg-lime-400 transition-all duration-300 group-hover:w-3/4"></span>
                </a>

            </div>

            <!-- Right: Language & Social Links -->
            <div class="hidden md:flex items-center space-x-4">
                <!-- Social Icons -->
                <div class="flex items-center space-x-2 border-r border-white/20 pr-4">
                    <a *ngFor="let link of accountsLinks" [href]="link.url" target="_blank" rel="noopener noreferrer"
                        class="h-9 w-9 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center text-gray-300 hover:text-lime-400 transition-all duration-300 border border-white/10 hover:border-lime-400/50"
                        [attr.aria-label]="link.label">
                        <fa-icon [icon]="link.icon" class="text-base"></fa-icon>
                    </a>
                </div>

                <!-- Language Selector -->
                <div class="relative">
                    <button id="language-button" (click)="toggleLanguageMenu()"
                        class="h-10 px-3 rounded-lg bg-white/10 hover:bg-white/20 flex items-center justify-center gap-2 transition-all duration-300 border border-white/20 hover:border-lime-400/50 group"
                        aria-label="Change language">
                        <fa-icon [icon]="faGlobe" class="text-lime-400"></fa-icon>
                        <span class="text-white text-sm font-semibold">{{ currentLanguage | uppercase }}</span>
                    </button>

                    <!-- Language Dropdown -->
                    <div *ngIf="languageMenuOpen" id="language-menu"
                        class="absolute top-full mt-2 right-0 bg-emerald-900/95 backdrop-blur-md border border-white/20 rounded-xl shadow-2xl overflow-hidden min-w-[180px] animate-fade-in">
                        <button *ngFor="let language of availableLanguages" (click)="changeLanguage(language.code)"
                            [class]="currentLanguage === language.code 
                                ? 'bg-lime-400/20 text-lime-400' 
                                : 'text-gray-200 hover:bg-white/10 hover:text-lime-400'"
                            class="w-full px-4 py-3 flex items-center gap-3 transition-all duration-200">
                            <span class="text-xl">{{ language.flag }}</span>
                            <div class="flex flex-col items-start">
                                <span class="text-sm font-semibold">{{ language.code | uppercase}}</span>
                                <span class="text-xs opacity-80">{{ language.name }}</span>
                            </div>
                            <svg *ngIf="currentLanguage === language.code" class="w-4 h-4 ml-auto" fill="currentColor"
                                viewBox="0 0 20 20">
                                <path fill-rule="evenodd"
                                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Mobile Menu Button -->
            <button (click)="toggleMobileMenu()"
                class="md:hidden h-10 w-10 rounded-lg bg-white/10 flex items-center justify-center text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="!mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16" />
                    <path *ngIf="mobileMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div *ngIf="mobileMenuOpen"
            class="md:hidden min-h-[calc(100vh-80px)] fixed inset-0 top-20 w-full bg-emerald-900/95 backdrop-blur-sm z-40">

            <!-- Animated overlay content -->
            <div class="flex flex-col h-full overflow-y-auto">

                <!-- Navigation Links Section -->
                <nav class="pt-6 pb-8">
                    <div class="px-4 mb-4">
                        <p class="text-xs font-semibold text-lime-400 uppercase tracking-widest opacity-70 mb-4">
                            {{ 'OTHERS.NAVIGATION' | translate }}
                        </p>
                    </div>

                    <div class="space-y-2 px-2">
                        <a *ngFor="let link of naivigationLinks; let last = last" [routerLink]="link.url"
                            (click)="toggleMobileMenu()" class="block px-4 py-3 text-gray-100 text-base font-medium rounded-lg transition-all duration-200
                          hover:text-lime-300 hover:bg-lime-400/10 hover:translate-x-1
                          active:bg-lime-400/20 active:text-lime-300
                          border-l-2 border-transparent hover:border-lime-400" [ngClass]="{'mb-4 mr-2': !last}">
                            {{ link.label | translate }}
                        </a>
                    </div>
                </nav>

                <!-- Mobile Language Selector Section -->
                <div class="border-t border-white/10 backdrop-blur-sm p-4">
                    <p class="text-xs font-semibold text-lime-400 tracking-widest opacity-70 mb-4">
                        {{ 'OTHERS.LANGUAGE' | translate | uppercase }}
                    </p>
                    <div class="flex gap-2">
                        <button *ngFor="let language of availableLanguages" (click)="changeLanguage(language.code)"
                            [class]="currentLanguage === language.code 
                            ? 'bg-lime-400 text-emerald-950' 
                            : 'bg-white/10 text-white hover:bg-white/20'"
                            class="flex-1 px-3 py-2 rounded-lg text-sm font-semibold transition-all">
                            {{ language.flag }} {{ language.code | uppercase }}
                        </button>
                    </div>
                </div>

                <!-- Spacer -->
                <div class="flex-grow"></div>

                <!-- Footer -->
                <div>
                    <p class="text-center text-sm text-gray-400 py-4">
                        &copy; {{ currentYear() }} <span class="font-bold text-white">kDevFolio</span>.
                        {{ 'FOOTER.ALL_RIGHTS_RESERVED' | translate }}.
                    </p>
                </div>

            </div>
        </div>
    </div>
</nav>
